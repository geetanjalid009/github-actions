# This is the name of the workflow which display in the Action tab
name: CICD

# Manual click (deliver) workflow whenever user needs
on:
  workflow_dispatch:
    inputs:
      environment:
        description: This is the environment value where this workflow runs
        defaults: 'dev'
        required: true
        type: choice
        options:
          - dev 
          - prod
          -staging 

job:
  # every job needs seperate runner, its called parallelism
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code 
        run: echo "code clone from github"
        
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build docker container
        run: echo "Docker container build"
      
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"
  
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deploying the app"
